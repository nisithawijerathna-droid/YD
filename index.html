<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Pro Downloader</title>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap');
        
        :root {
            --bg-color: #0f172a;
            --panel-bg: rgba(30, 41, 59, 0.7);
            --primary: #3b82f6;
            --primary-hover: #2563eb;
            --text-main: #f8fafc;
            --text-muted: #94a3b8;
            --border: rgba(255, 255, 255, 0.1);
        }

        body {
            font-family: 'Inter', sans-serif;
            background: linear-gradient(135deg, #020617 0%, #0f172a 100%);
            color: var(--text-main);
            margin: 0;
            padding: 0;
            display: flex;
            justify-content: center;
            align-items: flex-start;
            min-height: 100vh;
            overflow-x: hidden;
        }

        .container {
            width: 100%;
            max-width: 800px;
            padding: 40px 20px;
            box-sizing: border-box;
        }

        /* Glassmorphism Panel */
        .panel {
            background: var(--panel-bg);
            backdrop-filter: blur(12px);
            -webkit-backdrop-filter: blur(12px);
            border: 1px solid var(--border);
            border-radius: 16px;
            padding: 32px;
            box-shadow: 0 20px 25px -5px rgba(0, 0, 0, 0.5), 0 8px 10px -6px rgba(0, 0, 0, 0.5);
            transition: all 0.3s ease;
        }

        h1 {
            margin-top: 0;
            font-size: 28px;
            font-weight: 700;
            text-align: center;
            background: linear-gradient(to right, #60a5fa, #c084fc);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            margin-bottom: 30px;
        }

        .input-group {
            display: flex;
            gap: 12px;
            margin-bottom: 24px;
        }

        input[type="text"] {
            flex: 1;
            background: rgba(15, 23, 42, 0.6);
            border: 1px solid var(--border);
            color: white;
            padding: 14px 18px;
            border-radius: 10px;
            font-size: 16px;
            outline: none;
            transition: border-color 0.2s, box-shadow 0.2s;
        }

        input[type="text"]:focus {
            border-color: var(--primary);
            box-shadow: 0 0 0 3px rgba(59, 130, 246, 0.3);
        }

        button {
            background: var(--primary);
            color: white;
            border: none;
            padding: 14px 24px;
            font-size: 16px;
            font-weight: 600;
            border-radius: 10px;
            cursor: pointer;
            transition: background-color 0.2s, transform 0.1s;
        }

        button:hover {
            background: var(--primary-hover);
        }

        button:active {
            transform: scale(0.98);
        }

        button:disabled {
            background: #475569;
            cursor: not-allowed;
            transform: none;
            opacity: 0.7;
        }

        .settings-bar {
            display: flex;
            justify-content: space-between;
            align-items: center;
            font-size: 14px;
            color: var(--text-muted);
            margin-bottom: 20px;
            padding-bottom: 20px;
            border-bottom: 1px solid var(--border);
        }

        .folder-select {
            display: flex;
            align-items: center;
            gap: 8px;
        }

        .folder-path {
            display: inline-block;
            max-width: 250px;
            white-space: nowrap;
            overflow: hidden;
            text-overflow: ellipsis;
            background: rgba(0,0,0,0.2);
            padding: 4px 8px;
            border-radius: 6px;
            cursor: pointer;
            transition: background 0.2s;
        }
        
        .folder-path:hover {
            background: rgba(255,255,255,0.1);
        }

        /* Video Info Area */
        .video-info {
            display: none;
            gap: 20px;
            margin-bottom: 30px;
            animation: fadeIn 0.4s ease-out;
        }

        @keyframes fadeIn {
            from { opacity: 0; transform: translateY(10px); }
            to { opacity: 1; transform: translateY(0); }
        }

        .thumbnail {
            width: 200px;
            border-radius: 12px;
            object-fit: cover;
            box-shadow: 0 4px 6px -1px rgba(0, 0, 0, 0.3);
        }

        .details {
            display: flex;
            flex-direction: column;
            justify-content: center;
            flex: 1;
        }

        .title {
            font-size: 18px;
            font-weight: 600;
            margin: 0 0 8px 0;
            line-height: 1.4;
        }

        .uploader {
            color: var(--text-muted);
            font-size: 14px;
            margin-bottom: 16px;
        }

        .format-select {
            display: flex;
            flex-direction: column;
            gap: 10px;
            margin-bottom: 20px;
            max-height: 180px;
            overflow-y: auto;
            padding-right: 5px;
        }

        .format-select::-webkit-scrollbar {
            width: 6px;
        }
        
        .format-select::-webkit-scrollbar-track {
            background: rgba(0, 0, 0, 0.2);
            border-radius: 4px;
        }
        
        .format-select::-webkit-scrollbar-thumb {
            background: rgba(255, 255, 255, 0.2);
            border-radius: 4px;
        }

        .radio-box {
            display: none;
        }

        .radio-label {
            padding: 12px 16px;
            border: 1px solid var(--border);
            border-radius: 8px;
            cursor: pointer;
            font-size: 14px;
            font-weight: 500;
            transition: all 0.2s;
            display: flex;
            justify-content: space-between;
            align-items: center;
            background: rgba(15, 23, 42, 0.4);
        }
        
        .format-size {
            font-size: 12px;
            color: var(--text-muted);
            background: rgba(0,0,0,0.3);
            padding: 4px 8px;
            border-radius: 4px;
        }

        .radio-box:checked + .radio-label {
            background: var(--primary);
            border-color: var(--primary);
            color: white;
            box-shadow: 0 0 10px rgba(59, 130, 246, 0.3);
        }

        /* Progress Area */
        .progress-area {
            display: none;
            margin-top: 24px;
        }

        .progress-bar-bg {
            background: rgba(255, 255, 255, 0.1);
            height: 12px;
            border-radius: 6px;
            overflow: hidden;
            margin-bottom: 12px;
        }

        .progress-bar-fill {
            background: linear-gradient(90deg, #3b82f6, #8b5cf6);
            height: 100%;
            width: 0%;
            border-radius: 6px;
            transition: width 0.3s ease;
        }

        .progress-stats {
            display: flex;
            justify-content: space-between;
            font-size: 13px;
            color: var(--text-muted);
        }

        /* Loader */
        .loader {
            display: none;
            border: 3px solid rgba(255, 255, 255, 0.1);
            border-top: 3px solid var(--primary);
            border-radius: 50%;
            width: 24px;
            height: 24px;
            animation: spin 1s linear infinite;
            margin: 0 auto;
        }

        @keyframes spin {
            0% { transform: rotate(0deg); }
            100% { transform: rotate(360deg); }
        }

        #statusText {
            text-align: center;
            color: var(--text-muted);
            font-size: 14px;
            margin-top: 16px;
            min-height: 20px;
        }

        .btn-download-action {
            width: 100%;
            padding: 16px;
            font-size: 18px;
            border-radius: 12px;
            background: linear-gradient(to right, #3b82f6, #6366f1);
        }
        
        .btn-download-action:hover {
            background: linear-gradient(to right, #2563eb, #4f46e5);
            box-shadow: 0 0 15px rgba(59, 130, 246, 0.4);
        }

    </style>
</head>
<body>

    <div class="container">
        <div class="panel">
            <h1>Tube Downloader Pro</h1>
            
            <div class="settings-bar">
                <div class="folder-select">
                    <span>Save to:</span>
                    <span class="folder-path" id="downloadPath" onclick="changeFolder()" title="Click to change folder">Loading...</span>
                </div>
            </div>

            <div class="input-group">
                <input type="text" id="urlInput" placeholder="Paste YouTube URL here..." onkeypress="handleEnter(event)">
                <button id="fetchBtn" onclick="fetchInfo()">Fetch Info</button>
            </div>

            <div id="loading" class="loader"></div>
            <div id="statusText"></div>

            <div class="video-info" id="videoInfo">
                <img src="" alt="Thumbnail" class="thumbnail" id="thumbImg">
                <div class="details">
                    <h3 class="title" id="videoTitle">Video Title</h3>
                    <div class="uploader" id="videoUploader">Channel Name • 10:00</div>
                    
                    <div class="format-select" id="formatContainer">
                        <!-- Dynamically populated -->
                    </div>

                    <button class="btn-download-action" id="downloadBtn" onclick="startDownload()">Download Now</button>
                </div>
            </div>

            <div class="progress-area" id="progressArea">
                <div class="progress-bar-bg">
                    <div class="progress-bar-fill" id="progressBar"></div>
                </div>
                <div class="progress-stats">
                    <span id="progressPercent">0%</span>
                    <span id="progressSpeed">0 KB/s</span>
                    <span id="progressEta">ETA: 00:00</span>
                </div>
            </div>

        </div>
    </div>

    <script>
        let currentUrl = '';

        window.addEventListener('pywebviewready', function() {
            pywebview.api.get_directory().then(function(dir) {
                document.getElementById('downloadPath').textContent = dir;
            });
        });

        function changeFolder() {
            pywebview.api.select_directory().then(function(dir) {
                document.getElementById('downloadPath').textContent = dir;
            });
        }

        function handleEnter(e) {
            if (e.key === 'Enter') {
                fetchInfo();
            }
        }

        function formatBytes(bytes) {
            if (!bytes || bytes === 0) return 'Unknown Size';
            const sizes = ['Bytes', 'KB', 'MB', 'GB', 'TB'];
            const i = parseInt(Math.floor(Math.log(bytes) / Math.log(1024)));
            return Math.round(bytes / Math.pow(1024, i), 2) + ' ' + sizes[i];
        }

        function fetchInfo() {
            const url = document.getElementById('urlInput').value.trim();
            if (!url) {
                showStatus('Please enter a valid YouTube URL', true);
                return;
            }

            document.getElementById('fetchBtn').disabled = true;
            document.getElementById('loading').style.display = 'block';
            document.getElementById('videoInfo').style.display = 'none';
            document.getElementById('progressArea').style.display = 'none';
            showStatus('Fetching video information...');

            pywebview.api.get_video_info(url).then(function(res) {
                document.getElementById('fetchBtn').disabled = false;
                document.getElementById('loading').style.display = 'none';

                if (res.status === 'success') {
                    showStatus('');
                    currentUrl = url;
                    
                    document.getElementById('thumbImg').src = res.thumbnail;
                    document.getElementById('videoTitle').textContent = res.title;
                    document.getElementById('videoUploader').textContent = `${res.uploader} • ${res.duration}`;
                    
                    const formatContainer = document.getElementById('formatContainer');
                    formatContainer.innerHTML = '';
                    
                    res.formats.forEach((fmt, idx) => {
                        const input = document.createElement('input');
                        input.type = 'radio';
                        input.id = `fmt_${idx}`;
                        input.name = 'format';
                        input.value = fmt.id;
                        input.dataset.type = fmt.type;
                        input.className = 'radio-box';
                        if (idx === 0) input.checked = true;
                        
                        const label = document.createElement('label');
                        label.htmlFor = `fmt_${idx}`;
                        label.className = 'radio-label';
                        
                        const labelText = document.createElement('span');
                        labelText.textContent = fmt.label;
                        
                        const sizeSpan = document.createElement('span');
                        sizeSpan.className = 'format-size';
                        sizeSpan.textContent = formatBytes(fmt.size);
                        
                        label.appendChild(labelText);
                        label.appendChild(sizeSpan);
                        
                        formatContainer.appendChild(input);
                        formatContainer.appendChild(label);
                    });
                    
                    document.getElementById('videoInfo').style.display = 'flex';
                } else {
                    showStatus(`Error: ${res.message}`, true);
                }
            }).catch(function(err) {
                document.getElementById('fetchBtn').disabled = false;
                document.getElementById('loading').style.display = 'none';
                showStatus(`Connection Error: ${err}`, true);
            });
        }

        function startDownload() {
            const selected = document.querySelector('input[name="format"]:checked');
            if (!selected) return;
            
            const formatId = selected.value;
            const formatType = selected.dataset.type;
            
            document.getElementById('downloadBtn').disabled = true;
            document.getElementById('downloadBtn').textContent = 'Downloading...';
            document.getElementById('progressArea').style.display = 'block';
            
            updateProgress(0, 'Connecting...', 'Calculating...');

            pywebview.api.download_video(currentUrl, formatId, formatType).then(function(res) {
                // Download started
            });
        }

        function updateProgress(percent, speed, eta) {
            document.getElementById('progressBar').style.width = `${percent}%`;
            document.getElementById('progressPercent').textContent = `${Math.floor(percent)}%`;
            document.getElementById('progressSpeed').textContent = speed;
            document.getElementById('progressEta').textContent = `ETA: ${eta}`;
        }

        function downloadComplete() {
            document.getElementById('downloadBtn').disabled = false;
            document.getElementById('downloadBtn').textContent = 'Download Another';
            showStatus('Download complete! Saved to your folder.', false, '#34d399');
        }

        function downloadError(msg) {
            document.getElementById('downloadBtn').disabled = false;
            document.getElementById('downloadBtn').textContent = 'Retry Download';
            showStatus(`Download Error: ${msg}`, true);
        }

        function showStatus(text, isError = false, color = null) {
            const statusEl = document.getElementById('statusText');
            statusEl.textContent = text;
            if (isError) {
                statusEl.style.color = '#ef4444'; // Red
            } else if (color) {
                statusEl.style.color = color;
            } else {
                statusEl.style.color = 'var(--text-muted)';
            }
        }
    </script>
</body>
</html>
